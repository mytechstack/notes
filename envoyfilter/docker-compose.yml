version: "3.9"

services:

  # ── Mock OAuth 2.0 server ───────────────────────────────────────────────────
  oauth-server:
    build: ./oauth-server
    container_name: oauth-server
    environment:
      JWT_SECRET: "super-secret-key-change-in-prod"
      PORT: "8082"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Mock backend service ────────────────────────────────────────────────────
  backend-service:
    build: ./backend-service
    container_name: backend-service
    environment:
      JWT_SECRET: "super-secret-key-change-in-prod"
      PORT: "8081"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Token-manager sidecar (ext_proc gRPC) ──────────────────────────────────
  # Envoy opens a gRPC stream (ExternalProcessor/Process) for every request.
  # The service returns a cached JWT; only calls OAuth when near expiry.
  #   9090 — gRPC ext_proc  (Envoy connects here)
  #   8083 — HTTP /health   (Docker health check)
  token-manager:
    build: ./token-manager
    container_name: token-manager
    environment:
      OAUTH_SERVER_URL: "http://oauth-server:8082"
      CLIENT_ID: "envoy-proxy"
      CLIENT_SECRET: "envoy-secret"
      REFRESH_BUFFER_SECS: "60"
      GRPC_PORT: "9090"
      HEALTH_PORT: "8083"
    ports:
      - "9090:9090"   # gRPC ext_proc
      - "8083:8083"   # HTTP health check
    depends_on:
      oauth-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Envoy proxy ─────────────────────────────────────────────────────────────
  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: envoy
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"   # proxy listener
      - "9901:9901"   # admin dashboard
    command: ["/usr/local/bin/envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    depends_on:
      token-manager:
        condition: service_healthy
      backend-service:
        condition: service_healthy

networks:
  default:
    name: envoy-oauth-demo
