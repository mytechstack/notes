static_resources:

  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: backend_service
                  timeout: 10s
          http_filters:
          # ── ext_proc filter ──────────────────────────────────────────────────
          # Envoy opens a bidirectional gRPC stream (ExternalProcessor/Process)
          # to the token-manager for every request.
          #
          # processing_mode controls which phases are streamed to the service:
          #   request_header_mode: SEND  → we mutate headers here (inject token)
          #   response_header_mode: SKIP → we don't need to touch the response
          #   body/trailer modes default to NONE (not streamed)
          #
          # The token-manager responds with a HeaderMutation that sets:
          #   authorization: Bearer <cached-jwt>
          #   x-envoy-injected-token: true
          # ────────────────────────────────────────────────────────────────────
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              grpc_service:
                envoy_grpc:
                  cluster_name: token_manager_grpc
              processing_mode:
                request_header_mode: SEND
                response_header_mode: SKIP
              message_timeout: 5s
              # Block requests if the token-manager is unreachable
              failure_mode_allow: false

          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  # ── Backend service ──────────────────────────────────────────────────────────
  - name: backend_service
    connect_timeout: 5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: backend_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: backend-service
                port_value: 8081

  # ── Token-manager gRPC (ext_proc) ─────────────────────────────────────────
  # Must use HTTP/2 — gRPC requires it.
  - name: token_manager_grpc
    connect_timeout: 5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: token_manager_grpc
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: token-manager
                port_value: 9090

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
